name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    env:
      DJANGO_ENV: development
      DJANGO_SECRET_KEY: ci-test-secret-key-not-used-in-production-xxxxxxxxxxxx
      DEBUG: "True"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      ANALYTICS_SOURCE: csv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install lint/format tools (dev-only, not in requirements.txt)
          pip install flake8 pyflakes

      - name: Django system checks
        run: python manage.py check --fail-level WARNING

      - name: Run migrations (smoke test)
        run: python manage.py migrate --run-syncdb

      - name: Run test suite
        run: python manage.py test analytics_assistant --verbosity=2

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style
          flake8 analytics_assistant config \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          # Full style check — treat as advisory (exit 0) so CI doesn't block on style
          flake8 analytics_assistant config \
            --count \
            --max-line-length=120 \
            --exclude=migrations \
            --statistics \
            || true

  security-check:
    name: Django Deploy Checks
    runs-on: ubuntu-latest
    needs: test

    env:
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: "ci-production-fake-key-for-check-only-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      DEBUG: "False"
      ALLOWED_HOSTS: "example.com"
      ANALYTICS_SOURCE: csv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django deployment checks
        run: python manage.py check --deploy --settings=config.settings_production --fail-level ERROR
