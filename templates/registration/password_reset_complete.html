<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - Nexa Analytics AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b111e;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #6366f1;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .success-icon {
            font-size: 3rem;
            color: #10b981;
            margin-bottom: 1.5rem;
        }

        h1 {
            margin: 0 0 1rem;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 2rem;
        }

        .btn {
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="success-icon">✔️</div>
        <h1>Reset Successful</h1>
        <p>Your password has been reset successfully. You may now sign in using your new credentials.</p>
        <a href="{% url 'login' %}" class="btn">Sign In</a>
    </div>
</body>
</html>
